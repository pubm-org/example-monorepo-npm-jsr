name: E2E Test
on:
  repository_dispatch:
    types: [pubm-release]
  workflow_dispatch:
    inputs:
      pubm_version:
        description: "pubm version to test"
        default: "latest"

permissions:
  contents: read
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun add jsr pubm@${{ inputs.pubm_version || github.event.client_payload.pubm_version || 'latest' }} @pubm/core@${{ inputs.pubm_version || github.event.client_payload.pubm_version || 'latest' }}

      - name: Setup npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          echo "access=public" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set prerelease version
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION="0.0.1-e2e.${TIMESTAMP}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            for (const dir of ['packages/core', 'packages/utils']) {
              for (const file of ['package.json', 'jsr.json']) {
                const p = dir + '/' + file;
                const data = JSON.parse(fs.readFileSync(p, 'utf8'));
                data.version = '${VERSION}';
                fs.writeFileSync(p, JSON.stringify(data, null, 2));
              }
            }
          "

      - name: Publish
        run: bunx pubm --mode ci --phase publish --any-branch --skip-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}

      - name: Verify npm deployment
        run: |
          sleep 30
          npm view @pubm-test/npm-jsr-core@${{ env.VERSION }}
          npm view @pubm-test/npm-jsr-utils@${{ env.VERSION }}

      - name: Verify jsr deployment
        run: |
          for PKG in pubm-test-npm-jsr-core pubm-test-npm-jsr-utils; do
            BODY=$(curl -s "https://jsr.io/@syi0808/${PKG}/meta.json")
          STATUS=$(echo "$BODY" | grep -c "$VERSION" || true)
            if [ "$STATUS" != "200" ]; then
              echo "::error::${PKG} not found on jsr (HTTP $STATUS)"
              exit 1
            fi
            echo "${PKG} verified on jsr"
          done
